- name: Install packages
  become: true
  
  tasks: 
  
  - name: remove all existing container files
    ansible.builtin.package:
      name: 
        - docker.io
        - docker-compose
        - docker-compose-v2
        - docker-doc
        - podman-docker
        - containerd
        - runc
      state: absent
  
  - name: update the ca-certs and download curl
    ansible.builtin.package:
      name: 
        - ca-certificates
        - curl
      state: latest

  - name: Add docker repository
    block: 

      - name:  Install apt key rings
        ansible.builtin.shell: sudo install -m 0755 -d /etc/apt/keyrings

      - name: Download keyrings file
        ansible.builtin.copy:
          src: https://download.docker.com/linux/ubuntu/gpg
          dest: /etc/apt/keyrings/docker.asc
      
      - name: Apply required permissions
        ansible.builtin.file: 
          path: /etc/apt/keyrings/docker.asc
          mode: 644

      - name: add the repo to apt sources
        ansible.builtin.copy:
          dest: /etc/apt/sources.list.d/docker.sources
          content: |
            